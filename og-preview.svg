<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="180" fill="#6366f1" opacity="0.08"/>
  <circle cx="1100" cy="530" r="220" fill="#818cf8" opacity="0.06"/>
  <circle cx="600" cy="315" r="300" fill="#4f46e5" opacity="0.04"/>

  <!-- Logo area - simplified penguin in box -->
  <rect x="60" y="190" width="160" height="110" rx="16" fill="#6366f1" opacity="0.95"/>
  <polygon points="55,190 225,190 210,150 70,150" fill="#818cf8" opacity="0.9"/>
  <ellipse cx="140" cy="215" rx="22" ry="28" fill="#1e293b"/>
  <ellipse cx="140" cy="220" rx="12" ry="16" fill="#f1f5f9"/>
  <circle cx="140" cy="190" r="14" fill="#1e293b"/>
  <ellipse cx="140" cy="192" rx="9" ry="8" fill="#f1f5f9"/>
  <circle cx="136" cy="189" r="2" fill="#1e293b"/>
  <circle cx="144" cy="189" r="2" fill="#1e293b"/>
  <polygon points="137,193 143,193 140,197" fill="#f59e0b"/>

  <!-- Title -->
  <text x="260" y="240" font-family="sans-serif" font-size="64" font-weight="bold" fill="white">开箱 Linux</text>

  <!-- Subtitle -->
  <text x="260" y="290" font-family="sans-serif" font-size="28" fill="#a5b4fc">一键装软件，Linux 就该这么简单</text>

  <!-- Feature tags -->
  <rect x="260" y="320" width="140" height="36" rx="18" fill="#4f46e5" opacity="0.8"/>
  <text x="330" y="344" font-family="sans-serif" font-size="16" fill="#c7d2fe" text-anchor="middle">🇨🇳 中国 53 款</text>

  <rect x="415" y="320" width="140" height="36" rx="18" fill="#4f46e5" opacity="0.8"/>
  <text x="485" y="344" font-family="sans-serif" font-size="16" fill="#c7d2fe" text-anchor="middle">🌍 国际 126 款</text>

  <rect x="570" y="320" width="140" height="36" rx="18" fill="#4f46e5" opacity="0.8"/>
  <text x="640" y="344" font-family="sans-serif" font-size="16" fill="#c7d2fe" text-anchor="middle">🔄 国内镜像源</text>

  <rect x="725" y="320" width="140" height="36" rx="18" fill="#4f46e5" opacity="0.8"/>
  <text x="795" y="344" font-family="sans-serif" font-size="16" fill="#c7d2fe" text-anchor="middle">🐧 Deepin/UOS</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#4f46e5" opacity="0.3"/>
  <text x="600" y="612" font-family="sans-serif" font-size="18" fill="#a5b4fc" text-anchor="middle">github.com/pzmmy/kaixiang-linux</text>
</svg>
