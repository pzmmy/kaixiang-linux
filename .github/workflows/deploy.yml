name: 构建并部署到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 缓存 Flathub 已验证应用列表
        id: cache-flathub
        uses: actions/cache@v4
        with:
          path: public/flathub-verified-cache.json
          key: flathub-verified-${{ hashFiles('scripts/fetch-verified-flatpaks.mjs') }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建
        run: npm run build

      - name: 部署到 gh-pages 分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npx gh-pages --dist out/ --dotfiles --no-history --message "deploy: ${{ github.sha }}"
