name: 构建并部署到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 缓存 Flathub 已验证应用列表
        id: cache-flathub
        uses: actions/cache@v4
        with:
          path: public/flathub-verified-cache.json
          key: flathub-verified-${{ hashFiles('scripts/fetch-verified-flatpaks.mjs') }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
