<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>
  <!-- 企鹅身体 -->
  <ellipse cx="100" cy="118" rx="40" ry="42" fill="#1E1B4B" opacity="0.9"/>
  <!-- 头部 -->
  <circle cx="100" cy="75" r="30" fill="#1E1B4B" opacity="0.9"/>
  <!-- 眼睛 -->
  <circle cx="88" cy="70" r="5" fill="white"/>
  <circle cx="112" cy="70" r="5" fill="white"/>
  <circle cx="89" cy="69" r="2.5" fill="#1E1B4B"/>
  <circle cx="113" cy="69" r="2.5" fill="#1E1B4B"/>
  <!-- 眼睛高光 -->
  <circle cx="90" cy="68" r="1" fill="white" opacity="0.8"/>
  <circle cx="114" cy="68" r="1" fill="white" opacity="0.8"/>
  <!-- 嘴巴 -->
  <polygon points="100,78 95,84 105,84" fill="#F59E0B"/>
  <!-- 肚子 -->
  <ellipse cx="100" cy="125" rx="22" ry="25" fill="white" opacity="0.15"/>
  <!-- 翅膀 -->
  <ellipse cx="65" cy="115" rx="10" ry="20" fill="#1E1B4B" opacity="0.7" transform="rotate(-15, 65, 115)"/>
  <ellipse cx="135" cy="115" rx="10" ry="20" fill="#1E1B4B" opacity="0.7" transform="rotate(15, 135, 115)"/>
  <!-- 脚 -->
  <ellipse cx="86" cy="158" rx="10" ry="5" fill="#F59E0B" opacity="0.8"/>
  <ellipse cx="114" cy="158" rx="10" ry="5" fill="#F59E0B" opacity="0.8"/>
  <!-- 开箱标签 -->
  <rect x="70" y="172" rx="8" ry="8" width="60" height="18" fill="white" opacity="0.15"/>
  <text x="100" y="185" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="bold" opacity="0.8">开箱</text>
</svg>
